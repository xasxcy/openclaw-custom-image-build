name: Build & Push OpenClaw Custom Image

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.tools'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      install_browser:
        description: 'Install Chromium (true/false)'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  TOOLS_IMAGE: ghcr.io/xasxcy/openclaw-tools
  FINAL_IMAGE: ghcr.io/xasxcy/openclaw

jobs:
  build-tools:
    name: Build tools layer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tools-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push tools image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          push: true
          tags: |
            ${{ env.TOOLS_IMAGE }}:latest
            ${{ env.TOOLS_IMAGE }}:${{ github.run_number }}
          cache-from: type=registry,ref=${{ env.TOOLS_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.TOOLS_IMAGE }}:cache,mode=max

  build-final:
    name: Build final image
    runs-on: ubuntu-latest
    needs: build-tools
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine install_browser value
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "install_browser=${{ inputs.install_browser && '1' || '' }}" >> $GITHUB_OUTPUT
          else
            echo "install_browser=1" >> $GITHUB_OUTPUT
          fi

      - name: Build and push final image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FINAL_IMAGE }}:latest
            ${{ env.FINAL_IMAGE }}:${{ github.run_number }}
          build-args: |
            OPENCLAW_INSTALL_BROWSER=${{ steps.args.outputs.install_browser }}
          cache-from: type=registry,ref=${{ env.FINAL_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.FINAL_IMAGE }}:cache,mode=max
