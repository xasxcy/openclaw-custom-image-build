services:
  openclaw-gateway:
    image: ghcr.io/xasxcy/openclaw:latest # openclaw:local
    container_name: openclaw-gateway

    env_file:
      - path: .env_for_container
        required: false
    environment:
      TZ: Asia/Shanghai
      # v2026.3.13-1: 官方新增 OPENCLAW_TZ，用于容器内时区固定
      OPENCLAW_TZ: Asia/Shanghai
      HOME: /home/node
      TERM: xterm-256color
      # 生成一个安全的 Token 用于连接
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # Persist Playwright browser downloads
      PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright

      # Google Vertex
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION}
      # GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      GOOGLE_APPLICATION_CREDENTIALS: /home/node/.config/gcloud/application_default_credentials.json

      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME}

      # NODE_USE_ENV_PROXY: "1"
      # NODE_OPTIONS: "--use-env-proxy"
      # NODE_ENV: production

      HOMEBREW_PREFIX: /home/linuxbrew/.linuxbrew
      HOMEBREW_BREW_FILE: /home/linuxbrew/.linuxbrew/bin/brew

      # 代理设置（在 .env 中配置，留空则不走代理）
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,::1,openclaw-gateway,openclaw-cli

      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: localhost,127.0.0.1,::1,openclaw-gateway,openclaw-cli

    volumes:
      # 危险操作: 挂载 docker, 加上 user:root, 此容器有能力控制全部 docker.
      - /var/run/docker.sock:/var/run/docker.sock

      # Persist the entire container home (recommended for Playwright + caches)
      - ${OPENCLAW_HOME_VOLUME:-openclaw_home}:/home/node

      # Keep standard bind mounts
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace

      # Vertex
      - ${OPENCLAW_CONFIG_DIR}/application_default_credentials.json:/home/node/.config/gcloud/application_default_credentials.json:ro

    ports:
      # ⚠️ 允许局域网访问 Dashboard (18789)
      # - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "18789:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"

    user: root
    # privileged: true
    init: true
    restart: unless-stopped

    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - ${OPENCLAW_GATEWAY_BIND:-lan}
      - --port
      - "18789"

    healthcheck:
      # v2026.3.7+: 官方暴露 /healthz HTTP 端点，比 CLI 更轻量
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # CLI 工具，用于配对和调试
  openclaw-cli:
    image: ghcr.io/xasxcy/openclaw:latest # openclaw:local
    container_name: openclaw-cli
    # ⚠️ 关键：使用 service 模式共享 Gateway 网络，避免连不上; 同时拒绝其他容器的连接
    network_mode: "service:openclaw-gateway"

    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      # OPENCLAW_GATEWAY_URL: ws://openclaw-gateway:18789
      BROWSER: echo

      # Persist Playwright browser downloads
      PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright

      HOMEBREW_PREFIX: /home/linuxbrew/.linuxbrew
      HOMEBREW_BREW_FILE: /home/linuxbrew/.linuxbrew/bin/brew

      # 代理设置（在 .env 中配置，留空则不走代理）
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: "localhost,127.0.0.1,::1,openclaw-gateway,openclaw-cli"

    volumes:
      - ${OPENCLAW_HOME_VOLUME:-openclaw_home}:/home/node
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace

    user: root
    stdin_open: true
    tty: true
    init: true

    entrypoint: ["node", "dist/index.js"]

volumes:
  openclaw_home:
